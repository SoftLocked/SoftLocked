<body onload="decisionRedirect()">
    
    <script>
        function decisionRedirect() {
                rand = 100*Math.random();
                if (rand < 100*640/28474) {
                    location.replace("reject.html")
                } else {
                    location.replace("accept.html")
                }
        }
    </script>
